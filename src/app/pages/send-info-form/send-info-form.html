<div class="header-wrapper">
  <header class="header-text" >
  Get an Estimate for Workspace
  </header>
</div>


<body>
  <div class="title-text">
    <div class="title-text name" >Post Your Requirements</div>
    <div class ="title-text quote" >
      Please fill the form below to receive
      a quote for workspace. Please add all
      the details required.
    </div>
  </div>

    <form class="form-data form-style" (ngSubmit)="onSubmit()">
  <div class="form-data text">
    <div class="form-data header-text">Contact details</div>

    <div class="form-data quote">Please fill your information so we can get in touch with you.</div>
  </div>
  <br>
  <app-send-info-input
    id="name"
    label="Name"
    type="text"
    placeholder="Your Name"
    [(value)]="formData.name">
  </app-send-info-input>

  <app-send-info-input
    id="phone"
    label="Phone"
    type="tel"
    placeholder="8 (123) 456-78-90"
    [(value)]="formData.phone">
  </app-send-info-input>

  <app-send-info-input
    id="email"
    label="Email"
    type="email"
    placeholder="Your Email"
    [(value)]="formData.email">
  </app-send-info-input>

  <app-send-info-input
    id="date"
    label="Date"
    type="date"
    placeholder="Select date"
    [(value)]="formData.date">
  </app-send-info-input>


</form>

</body>

<footer class="footer-text">
  <app-send-info-button
    text="Submit"
    type="submit"
    (clicked)="onSubmit()">
  </app-send-info-button>
</footer>
