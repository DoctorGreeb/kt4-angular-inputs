<header class="header-text" appContrast>
Get an Estimate for Workspace
</header>


<body>
  <div class="title-text">
    <div class="title-text name">Post Your Requirements</div>
    <div class ="title-text quote">
      Please fill the form below to receive
      a quote for workspace. Please add all
      the details required.
    </div>
  </div>
    <form class="form-data form-style">
      <div class="form-data text">
        <div class="form-data header-text">Contact details</div>
        <div class="form-data quote">Please fill your information so we can get in touch with you.</div>
      </div>
      <div>
        <label for="name">Name</label>
        <input type="text" id="name" name="name" required>
      </div>
      <div>
        <label for="phone">Phone</label>
        <input type="tel" id="phone" name="phone" required>
      </div>
      <div>
        <label for="email">Email</label>
        <input type="email" id="email" name="email" required>
      </div>

      <div>
        <label for="date">Date</label>
        <input type="date" id="date" name="date" required>
      </div>
    </form>

</body>


<footer class="footer-text">
  <button>Submit</button>

</footer>
